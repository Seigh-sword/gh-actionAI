name: Ollama Issue Bot

on:
  issues:
    types: [opened]

jobs:
  ai:
    runs-on: ubuntu-latest

    steps:
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          sleep 10

      - name: Pull model
        run: |
          ollama pull tinyllama

      - name: Get issue data
        run: |
          echo "${{ github.event.issue.title }}" > title.txt
          echo "${{ github.event.issue.body }}" > body.txt

      - name: Run AI
        run: |
          PROMPT="You are a helpful coding assistant. Keep answers short.

Title: $(cat title.txt)
Body: $(cat body.txt)"

          ollama run tinyllama "$PROMPT" > response.txt

      - name: Post comment
        run: |
          RESPONSE=$(cat response.txt | sed ':a;N;$!ba;s/\n/\\n/g')

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -d "{\"body\":\"$RESPONSE\"}"